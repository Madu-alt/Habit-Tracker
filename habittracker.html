<!DOCTYPE html>
<html lang="PT-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habit Tracker</title>
    <link rel="icon" type="image/x-icon" href="pixelheart.jpg">
    <link href="https://fonts.cdnfonts.com/css/holly-bale" rel="stylesheet">
    <link rel="stylesheet" href="habittracker.css">
    <link rel=""
</head>
<body>
    <!-- Title e subtitle-->
    <h1 id="month-title">Mês</h1>
    <h2 id="subtitle">Monitor de hábitos mensais</h2>

    <!--Area do calendário-->
    <div id="calendarConteiner">
        <div id="calendarDiv">
            <div id="calendarHeading">
              <p id="habitTitle">Meu novo hábito</p>
              <p id="totalDays">Total de dias: 0/31</p>
            </div>
            <div id="calendarContent">
              <div id="tracker">
                <div class="days">
                    <div class="day">1</div>
                    <div class="day">2</div>
                    <div class="day">3</div>
                    <div class="day">4</div>
                    <div class="day">5</div>
                    <div class="day">6</div>
                    <div class="day">7</div>
                </div>
                <div class="days">
                    <div class="day">8</div>
                    <div class="day">9</div>
                    <div class="day">10</div>
                    <div class="day">11</div>
                    <div class="day">12</div>
                    <div class="day">13</div>
                    <div class="day">14</div>
                </div>
                <div class="days">
                    <div class="day">15</div>
                    <div class="day">16</div>
                    <div class="day">17</div>
                    <div class="day">18</div>
                    <div class="day">19</div>
                    <div class="day">20</div>
                    <div class="day">21</div>
                </div>
                <div class="days">
                    <div class="day">22</div>
                    <div class="day">23</div>
                    <div class="day">24</div>
                    <div class="day">25</div>
                    <div class="day">26</div>
                    <div class="day">27</div>
                    <div class="day">28</div>
                </div>
                <div class="days">
                    <div class="day">29</div>
                    <div class="day">30</div>
                    <div class="day">31</div>
                </div>
              </div>
            </div>
        </div>
    </div>

    <div id="buttons">
     <button id="resetButton">Resetar</button> <button id="saveButton">Salvar progresso 💾</button>
    </div>
    
    <div class="streak">
      <p id="streakTitle">Sua sequência atual é: 0 dias</p>
      <p id="streakRecord"> Sua melhor sequência de dias é: 0 dias</p>
    </div>
  <script src="habittracker.js"></script>
</body>
</html>
